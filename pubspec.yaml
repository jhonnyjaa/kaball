name: kaballo
description: Warehouse inventory sweep application — offline-first, fast, industrial.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Database — Drift ORM with SQLite FTS5
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # State management
  flutter_riverpod: ^2.5.1

  # Excel import/export
  excel: ^4.0.6

  # File operations
  file_picker: ^8.1.2
  share_plus: ^10.1.2

  # Utilities
  uuid: ^4.5.1
  archive: ^3.6.1
  device_info_plus: ^10.1.2
  intl: ^0.19.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.20.0
  build_runner: ^2.4.11
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
